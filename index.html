<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Health Data Viewer</title>
	<link rel="stylesheet" href="./css/index.css">
	<link rel="stylesheet" href="./css/bootstrap.min.css">
	<link rel="stylesheet" href="./css/bootstrap-icons.min.css">
</head>

<body class="p-3 bg-body-secondary">
	<div class="modal fade" id="signin_model" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
		aria-labelledby="signin_model_label" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h1 class="modal-title fs-5" id="signin_model_label">Authorize your Google Account</h1>
				</div>
				<div class="modal-body">
					Sign in with your Google Account and authorize access to Fitness and Measurement Data - Read Only.
				</div>
				<div class="modal-footer">
					<button id="signin_button" class="btn btn-primary" type="button">
						<span class="spinner-border spinner-border-sm" aria-hidden="true" hidden></span>
						<span role="status">Sign In</span>
					</button>
				</div>
			</div>
		</div>
	</div>

	<div id="load_frame"
		class="w-100 h-100 justify-content-center align-items-center flex-column d-flex position-absolute top-0 start-0 z-3 bg-opacity-75 bg-body-tertiary">
		<div class="spinner-border" style="width: 3rem; height: 3rem;" role="status">
			<span class="visually-hidden">Loading...</span>
		</div>
		<strong role="status" class="pt-3 fs-3">Loading...</strong>
	</div>

	<div class="d-flex align-items-center justify-content-between mb-4">
		<button class="btn rounded-circle p-2" id="next-day">
			<i class="bi bi-chevron-left"></i>
		</button>

		<h6 class="mb-0 text-center" id="date-header">Today</h6>

		<button class="btn rounded-circle p-2" id="next-day">
			<i class="bi bi-chevron-right"></i>
		</button>
	</div>

	<div id="steps_radial">
		<div class="container text-center" style="height: 180px; margin-bottom: -16px;">
			<div class="radial-progress-bar" style="--value: 75; --color: var(--bs-blue)" role="progressbar"
				aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
				<i class="bi bi-person-walking"></i>
			</div>
		</div>

		<div class="container text-center mb-4">
			<h1 class="mb-0 fw-normal" style="font-size: 2.5rem;">3,384</h1>
			<small class="text-secondary">Steps</small>
		</div>
	</div>

	<div class="container px-2">
		<div class="row row-cols-3 align" style="height: 65px; --bs-gutter-x: 0">
			<div id="distance_radial" class="h-100">
				<div class="container text-center" style="margin-bottom: -4px;">
					<div class="radial-progress-bar" style="--value: 75; --color: var(--bs-yellow)" role="progressbar"
						aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
						<i class="bi bi-rulers"></i>
					</div>
				</div>

				<div class="container text-center">
					<h1 class="mb-0 fw-normal" style="font-size: 1.25rem;">1.5km</h1>
					<small class="text-secondary">Distance</small>
				</div>
			</div>
			<div id="activity_radial" class="h-100">
				<div class="container text-center" style="margin-bottom: -4px;">
					<div class="radial-progress-bar" style="--value: 75; --color: var(--bs-purple)" role="progressbar"
						aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
						<i class="bi bi-stopwatch"></i>
					</div>
				</div>

				<div class="container text-center">
					<h1 class="mb-0 fw-normal" style="font-size: 1.25rem;">32 <small style="font-size: 1rem;">m</small>
					</h1>
					<small class="text-secondary">Activity</small>
				</div>
			</div>
			<div id="pulse_radial" class="h-100">
				<div class="container text-center" style="margin-bottom: -4px;">
					<div class="radial-progress-bar" style="--value: 75; --color: var(--bs-green)" role="progressbar"
						aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
						<i class="bi bi-activity"></i>
					</div>
				</div>

				<div class="container text-center">
					<h1 class="mb-0 fw-normal" style="font-size: 1.25rem;">80 – 92</h1>
					<small class="text-secondary">Avg. Pulse</small>
				</div>
			</div>
		</div>
	</div>

	<script src="https://accounts.google.com/gsi/client" defer></script>
	<script src="https://apis.google.com/js/api.js"></script>
	<script src="./js/bootstrap.bundle.min.js"></script>
	<script src="./js/index.js"></script>
</body>

</html>
